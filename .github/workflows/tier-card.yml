name: Update Tier Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tier card
        run: |
          mkdir -p profile
          curl -s "https://github-tier.vercel.app/api/tier?user=${{ github.repository_owner }}&theme=tokyonight" -o profile/tier.svg

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/tier.svg
          git commit -m "Update tier card" || exit 0
          git push
